<!DOCTYPE html>
<html>
<head>
  <title>Thêm học sinh</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

<div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow-lg">

<h1 class="text-2xl font-bold mb-4">Thêm học sinh</h1>

<div class="grid grid-cols-2 gap-4">
  <input id="ma" placeholder="Mã HS" class="border p-2 rounded">
  <input id="ten" placeholder="Họ tên" class="border p-2 rounded">
  <input id="ns" type="date" class="border p-2 rounded">
  <select id="gt" class="border p-2 rounded">
  <option value="">Chọn giới tính</option>
  <option value="Nam">Nam</option>
  <option value="Nữ">Nữ</option>
</select>
  <input id="lop" placeholder="Lớp" class="border p-2 rounded">
  <input id="email" placeholder="Email" class="border p-2 rounded">
  <input id="sdt" placeholder="SĐT" class="border p-2 rounded">
  <input id="nk" placeholder="Niên khóa" class="border p-2 rounded">
  <input id="gc" placeholder="Ghi chú" class="border p-2 rounded col-span-2">
</div>

<button onclick="addStudent()"
class="bg-blue-500 text-white px-4 py-2 rounded mt-4">
Lưu
</button>

<a href="/" class="ml-4 text-gray-600">Quay lại</a>

</div>

<script src="script.js"></script>
</body>
</html>
